<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python Lab — TheOddsAlgo</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a14;
  --surface: #0f0f1e;
  --border: #1a1a30;
  --text: #f0f0f0;
  --muted: #555570;
  --dim: #2a2a40;
  --green: #22c55e;
  --red: #ef4444;
  --yellow: #eab308;
  --blue: #4488ff;
  --mono: 'Space Mono', monospace;
  --sans: 'Space Grotesk', sans-serif;
}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 13px; -webkit-font-smoothing: antialiased; }
#shell { display: flex; height: 100vh; overflow: hidden; }

/* sidebar */
#sidebar {
  width: 200px; min-width: 200px; border-right: 1px solid var(--border);
  background: #09090f; display: flex; flex-direction: column; overflow: hidden;
}
.sb-top { padding: 16px 14px 10px; border-bottom: 1px solid var(--border); }
.sb-logo { font-family: var(--sans); font-size: 13px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 6px; margin-bottom: 2px; }
.sb-logo span { color: var(--green); }
.sb-back { font-size: 9px; color: var(--muted); letter-spacing: 0.1em; text-decoration: none; text-transform: uppercase; }
.sb-back:hover { color: var(--text); }
.sb-progress { padding: 10px 14px; border-bottom: 1px solid var(--border); }
.sb-progress-label { font-size: 9px; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 6px; display: flex; justify-content: space-between; }
.sb-progress-label span { color: var(--green); }
.sb-bar { height: 2px; background: var(--dim); border-radius: 1px; }
.sb-bar-fill { height: 100%; background: var(--green); border-radius: 1px; transition: width 0.6s ease; }
#tree { flex: 1; overflow-y: auto; padding: 6px 0; }
#tree::-webkit-scrollbar { width: 2px; }
#tree::-webkit-scrollbar-thumb { background: var(--border); }
.sb-bottom { padding: 10px 14px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 6px; }
.sb-credits-link { font-size: 9px; color: var(--muted); letter-spacing: 0.1em; text-decoration: none; text-transform: uppercase; transition: color 0.15s; }
.sb-credits-link:hover { color: var(--text); }
.level-label { padding: 10px 14px 4px; font-size: 9px; color: var(--dim); letter-spacing: 0.15em; text-transform: uppercase; }
.trial-row {
  padding: 7px 14px; display: flex; align-items: center; gap: 8px;
  cursor: pointer; transition: background 0.1s; border-left: 2px solid transparent;
  font-size: 11px; color: var(--muted);
}
.trial-row:hover { background: var(--surface); color: #aaa; }
.trial-row.active { background: var(--surface); color: var(--text); border-left-color: var(--green); }
.trial-row.done { color: #555580; }
.trial-row.done .tr-dot { background: var(--green); }
.trial-row.active .tr-id { color: var(--green); }
.tr-id { font-size: 9px; font-weight: 700; width: 22px; flex-shrink: 0; color: var(--muted); }
.tr-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 10px; }
.tr-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--dim); flex-shrink: 0; }
.trial-row.active .tr-dot { background: var(--yellow); }

/* main */
#main { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
.mission-bar { padding: 16px 24px 14px; border-bottom: 1px solid var(--border); background: #09090f; flex-shrink: 0; }
.mb-meta { display: flex; align-items: baseline; gap: 12px; margin-bottom: 8px; }
.mb-id { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; }
.mb-level { font-size: 9px; color: var(--dim); letter-spacing: 0.08em; text-transform: uppercase; }
.mb-isl { font-size: 9px; color: var(--dim); margin-left: auto; }
.mb-mission { font-family: var(--sans); font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.4; }
.mb-concept { font-size: 10px; color: var(--muted); margin-top: 5px; }
#editor-wrap { flex: 1; display: flex; flex-direction: column; padding: 16px 24px 0; min-height: 0; }
.editor-label { font-size: 9px; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
.engine-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--yellow); flex-shrink: 0; }
.engine-dot.ready { background: var(--green); }
.engine-dot.err { background: var(--red); }
#editor {
  flex: 1; background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; color: #c8d3f5; font-family: var(--mono);
  font-size: 13px; line-height: 1.8; padding: 16px 18px;
  resize: none; outline: none; min-height: 120px; tab-size: 4;
  transition: border-color 0.15s;
}
#editor:focus { border-color: #2a2a50; }
#editor::placeholder { color: var(--dim); }
#editor::-webkit-scrollbar { width: 3px; }
#editor::-webkit-scrollbar-thumb { background: var(--border); }
.action-bar { padding: 12px 24px 0; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
.run-btn {
  padding: 8px 22px; background: transparent; border: 1px solid #2a2a50;
  border-radius: 5px; color: var(--text); font-family: var(--mono);
  font-size: 12px; cursor: pointer; letter-spacing: 0.08em; transition: all 0.15s;
}
.run-btn:hover { border-color: var(--text); }
.run-btn:active { transform: scale(0.97); }
.run-btn:disabled { opacity: 0.3; cursor: default; }
.text-btn { background: none; border: none; color: var(--muted); font-family: var(--mono); font-size: 11px; cursor: pointer; letter-spacing: 0.05em; transition: color 0.15s; padding: 0; }
.text-btn:hover { color: var(--text); }
.kb { margin-left: auto; font-size: 10px; color: var(--dim); }
#output { padding: 16px 24px 24px; font-size: 12px; line-height: 1.9; min-height: 80px; overflow-y: auto; flex-shrink: 0; max-height: 220px; }
#output::-webkit-scrollbar { width: 3px; }
#output::-webkit-scrollbar-thumb { background: var(--border); }
.out-line { color: #8888aa; white-space: pre-wrap; word-break: break-word; }
.out-pass { color: var(--green); }
.out-fail { color: var(--red); }
.out-hint { color: var(--yellow); }
.out-err { color: var(--red); opacity: 0.7; }
.out-info { color: var(--blue); opacity: 0.8; }
.next-btn { display: inline-block; margin-top: 10px; padding: 6px 0; background: none; border: none; color: var(--muted); font-family: var(--mono); font-size: 11px; cursor: pointer; letter-spacing: 0.08em; transition: color 0.15s; }
.next-btn:hover { color: var(--text); }
.status-bar { padding: 6px 24px; border-top: 1px solid var(--border); background: #09090f; font-size: 9px; color: var(--dim); display: flex; align-items: center; gap: 8px; flex-shrink: 0; letter-spacing: 0.08em; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
.fadein { animation: fadeIn 0.25s ease both; }
</style>
</head>
<body>
<div id="shell">
  <div id="sidebar">
    <div class="sb-top">
      <div class="sb-logo">TheOddsAlgo <span>Py Lab</span></div>
      <a class="sb-back" href="/">← main site</a>
    </div>
    <div class="sb-progress">
      <div class="sb-progress-label">Progress <span id="progressText">0 / 47</span></div>
      <div class="sb-bar"><div class="sb-bar-fill" id="progressBar" style="width:0%"></div></div>
    </div>
    <div id="tree"></div>
    <div class="sb-bottom">
      <a href="/lab" class="sb-credits-link">R Lab →</a>
      <a href="/references" class="sb-credits-link">credits & sources →</a>
    </div>
  </div>

  <div id="main">
    <div class="mission-bar">
      <div class="mb-meta">
        <span class="mb-id" id="mbId">trial 0.1</span>
        <span class="mb-level" id="mbLevel">Level 0 — Survival Basics</span>
        <span class="mb-isl" id="mbIsl">Python Docs</span>
      </div>
      <div class="mb-mission" id="mbMission">Loading...</div>
      <div class="mb-concept" id="mbConcept"></div>
    </div>
    <div id="editor-wrap">
      <div class="editor-label">
        <div class="engine-dot" id="engineDot"></div>
        <span id="engineLabel">loading Pyodide...</span>
      </div>
      <textarea id="editor" spellcheck="false" placeholder="# write your Python code here"></textarea>
    </div>
    <div class="action-bar">
      <button class="run-btn" id="runBtn" onclick="runCode()" disabled>run</button>
      <button class="text-btn" onclick="showHint()">hint</button>
      <button class="text-btn" onclick="resetEditor()">reset</button>
      <span class="kb">ctrl+enter</span>
    </div>
    <div id="output">
      <div class="out-info">// Run your code above. Output appears here.</div>
    </div>
    <div class="status-bar">
      <div class="engine-dot" id="statusDot"></div>
      <span id="statusText">initializing Pyodide...</span>
    </div>
  </div>
</div>

<script>
// ── TRIALS ────────────────────────────────────────────────────────────────────
const TRIALS = [

  // ── LEVEL 0: SURVIVAL BASICS ─────────────────────────────────────────────
  {
    id:"0.1", level:0, levelName:"Survival Basics",
    concept:"lists — store a sequence of values",
    ref:"Python Docs",
    mission:"Create a list named prices containing five closing prices: 182, 175, 190, 168, 195.",
    hint:"Lists use square brackets: prices = [a, b, c, ...]. What five values do you need?",
    starter:"# Store five closing prices in a list\nprices = ",
    validate(env, out) {
      const p = env.prices;
      if (!Array.isArray(p)) return {pass:false, msg:"prices isn't a list. use [ ]"};
      if (p.length !== 5) return {pass:false, msg:`prices has ${p.length} elements, expected 5`};
      const exp = [182, 175, 190, 168, 195];
      for (let i = 0; i < 5; i++) if (Math.abs(p[i] - exp[i]) > 0.001) return {pass:false, msg:`prices[${i}] = ${p[i]}, expected ${exp[i]}`};
      return {pass:true, msg:"prices = [182, 175, 190, 168, 195] ✓"};
    }
  },
  {
    id:"0.2", level:0, levelName:"Survival Basics",
    concept:"len() — count elements",
    ref:"Python Docs",
    mission:"You have a portfolio of stocks. Count how many positions are in prices and print it.",
    hint:"There's a built-in that answers 'how many things are in this?': len(). Try print(len(prices)).",
    starter:"prices = [182, 175, 190, 168, 195]\n# Count the positions and print\n",
    validate(env, out) {
      if (out.includes("5")) return {pass:true, msg:"5  — five positions in the portfolio"};
      return {pass:false, msg:`expected 5, got: ${out.slice(0,40)||"(nothing printed)"}`};
    }
  },
  {
    id:"0.3", level:0, levelName:"Survival Basics",
    concept:"for loop — iterate over a list",
    ref:"Python Docs",
    mission:"Loop over prices and print each one on its own line.",
    hint:"for price in prices: — then indented: print(price). Python uses indentation (4 spaces) instead of braces.",
    starter:"prices = [182, 175, 190, 168, 195]\n# Print each price\n",
    validate(env, out) {
      const lines = out.trim().split("\n").map(s => parseFloat(s.trim())).filter(n => !isNaN(n));
      if (lines.length >= 5 && Math.abs(lines[0]-182)<0.01 && Math.abs(lines[4]-195)<0.01)
        return {pass:true, msg:"182\n175\n190\n168\n195 ✓"};
      return {pass:false, msg:`expected 5 prices on separate lines. got: ${out.slice(0,60)||"(nothing)"}`};
    }
  },
  {
    id:"0.4", level:0, levelName:"Survival Basics",
    concept:"basic math — arithmetic operators",
    ref:"Python Docs",
    mission:"You bought 100 shares at $148.50 and sold at $162.30. Compute your profit and assign to profit.",
    hint:"profit = (sell - buy) * shares. Python uses *, -, + just like a calculator. Print profit to see the result.",
    starter:"buy = 148.50\nsell = 162.30\nshares = 100\n# Compute profit\nprofit = \nprint(profit)",
    validate(env, out) {
      const p = env.profit;
      const val = Array.isArray(p) ? p[0] : (typeof p === 'number' ? p : parseFloat(out));
      if (isNaN(val)) return {pass:false, msg:"profit is not defined or not a number"};
      if (Math.abs(val - 1380) > 0.5) return {pass:false, msg:`expected $1380.00 profit, got ${val}`};
      return {pass:true, msg:"profit = $1,380.00 ✓"};
    }
  },
  {
    id:"0.5", level:0, levelName:"Survival Basics",
    concept:"print() — output and string formatting",
    ref:"Python Docs",
    mission:"Print a summary line: 'Portfolio: 5 stocks, avg price $182.00' — compute avg from the list.",
    hint:"sum(prices)/len(prices) gives the average. Use an f-string: f'Portfolio: {n} stocks, avg price ${avg:.2f}'",
    starter:"prices = [182, 175, 190, 168, 195]\n# Compute avg and print the summary\n",
    validate(env, out) {
      if (out.includes("5") && out.includes("182")) return {pass:true, msg:"Portfolio summary printed ✓"};
      return {pass:false, msg:"print a string containing '5' and '182'. use an f-string."};
    }
  },

  // ── LEVEL 1: WORKING WITH NUMBERS ────────────────────────────────────────
  {
    id:"1.1", level:1, levelName:"Working With Numbers",
    concept:"list comprehensions — transform data",
    ref:"Python Docs",
    mission:"Convert a list of prices to returns using a list comprehension. returns[i] = (prices[i] - prices[i-1]) / prices[i-1] for i >= 1.",
    hint:"[expr for i in range(1, len(prices))] — inside expr, reference prices[i] and prices[i-1]. One line replaces a whole loop.",
    starter:"prices = [182, 175, 190, 168, 195]\n# Compute returns for each day (skip index 0)\nreturns = [(prices[i] - prices[i-1]) / prices[i-1] for i in range(1, len(prices))]\nprint([round(r, 4) for r in returns])",
    validate(env, out) {
      const r = env.returns;
      if (!Array.isArray(r)) return {pass:false, msg:"returns should be a list"};
      if (r.length !== 4) return {pass:false, msg:`expected 4 returns, got ${r.length}`};
      if (Math.abs(r[0] - (-0.03846)) > 0.002) return {pass:false, msg:`returns[0] ≈ ${r[0].toFixed(4)}, expected ~-0.0385`};
      return {pass:true, msg:`returns: ${r.map(v=>v.toFixed(4)).join(", ")} ✓`};
    }
  },
  {
    id:"1.2", level:1, levelName:"Working With Numbers",
    concept:"sum(), max(), min() — aggregation",
    ref:"Python Docs",
    mission:"Given daily_returns, find the total return (sum), best day (max), and worst day (min). Assign to total, best, worst.",
    hint:"Python has built-in sum(), max(), min() — pass the list directly. No import needed.",
    starter:"daily_returns = [0.012, -0.005, 0.023, -0.008, 0.015, 0.004, -0.011]\ntotal = \nbest = \nworst = \nprint(round(total,4), round(best,4), round(worst,4))",
    validate(env, out) {
      const t = env.total, b = env.best, w = env.worst;
      if (t === undefined) return {pass:false, msg:"total is not defined"};
      const expT = 0.012-0.005+0.023-0.008+0.015+0.004-0.011;
      if (Math.abs((Array.isArray(t)?t[0]:t) - expT) > 0.001) return {pass:false, msg:`total should be ~${expT.toFixed(4)}`};
      return {pass:true, msg:`total: ${expT.toFixed(4)}  best: 0.023  worst: -0.011 ✓`};
    }
  },
  {
    id:"1.3", level:1, levelName:"Working With Numbers",
    concept:"zip() — pair two lists together",
    ref:"Python Docs",
    mission:"Pair tickers with prices using zip() and print each as 'AAPL: $182'. Compute total portfolio value.",
    hint:"for ticker, price in zip(tickers, prices): — zip() locks two lists together element by element. Use an f-string to print.",
    starter:"tickers = ['AAPL', 'TSLA', 'NVDA']\nprices  = [189, 245, 875]\nshares  = [10, 5, 2]\n# Print each holding and compute total value\ntotal_value = 0\nfor ticker, price, qty in zip(tickers, prices, shares):\n    print(f'{ticker}: ${price}')\n    total_value += price * qty\nprint(f'Total: ${total_value}')",
    validate(env, out) {
      if (out.includes("AAPL") && out.includes("NVDA") && out.includes("3640"))
        return {pass:true, msg:"AAPL: $189  TSLA: $245  NVDA: $875  Total: $3640 ✓"};
      return {pass:false, msg:"print each ticker:price pair and the total value (expected $3640)"};
    }
  },
  {
    id:"1.4", level:1, levelName:"Working With Numbers",
    concept:"import numpy — vectorized math",
    ref:"NumPy Docs",
    mission:"Use numpy to compute the mean and standard deviation of returns. Assign to mu and sigma.",
    hint:"import numpy as np — then np.mean(arr) and np.std(arr). numpy works on lists directly.",
    starter:"import numpy as np\nreturns = [0.031, -0.014, 0.087, -0.052, 0.019, -0.033, 0.061, -0.008]\nmu = \nsigma = \nprint(f'mean={mu:.4f}  std={sigma:.4f}')",
    validate(env, out) {
      const mu = env.mu, sigma = env.sigma;
      if (mu === undefined) return {pass:false, msg:"mu is not defined — use np.mean()"};
      const m = Array.isArray(mu) ? mu[0] : mu;
      if (Math.abs(m - 0.011375) > 0.002) return {pass:false, msg:`mu ≈ ${m?.toFixed(4)}, expected ~0.0114`};
      if (sigma === undefined) return {pass:false, msg:"sigma is not defined — use np.std()"};
      return {pass:true, msg:`mean=${m?.toFixed(4)}  std≈0.0427 ✓`};
    }
  },
  {
    id:"1.5", level:1, levelName:"Working With Numbers",
    concept:"numpy arrays — vectorized operations",
    ref:"NumPy Docs",
    mission:"Create a numpy array of prices and compute: annualized volatility = std(daily_returns) * sqrt(252). Assign to ann_vol.",
    hint:"np.array([...]) makes an array. np.sqrt(252) gives √252. Multiply sigma by it — no loop needed.",
    starter:"import numpy as np\nreturns = np.array([0.031, -0.014, 0.087, -0.052, 0.019, -0.033, 0.061, -0.008])\nann_vol = \nprint(f'Annualized vol: {ann_vol:.1%}')",
    validate(env, out) {
      const av = env.ann_vol;
      const v = Array.isArray(av) ? av[0] : av;
      if (v === undefined) return {pass:false, msg:"ann_vol is not defined"};
      if (v < 0.5 || v > 1.0) return {pass:false, msg:`ann_vol ≈ ${v?.toFixed(3)}, expected ~0.677 (67.7%)`};
      return {pass:true, msg:`Annualized vol ≈ ${(v*100).toFixed(1)}% ✓`};
    }
  },

  // ── LEVEL 2: DATAFRAMES WITH PANDAS ──────────────────────────────────────
  {
    id:"2.1", level:2, levelName:"DataFrames with pandas",
    concept:"pd.DataFrame — tabular data",
    ref:"pandas Docs",
    mission:"Build a portfolio DataFrame with columns: ticker, price, shares. Assign to df.",
    hint:"import pandas as pd. Then pd.DataFrame({'col1': [...], 'col2': [...]}) — each key is a column name, each value is a list.",
    starter:"import pandas as pd\ndf = pd.DataFrame({\n    'ticker': ['AAPL', 'TSLA', 'NVDA'],\n    'price':  [189, 245, 875],\n    'shares': [10, 5, 2]\n})\nprint(df)",
    validate(env, out) {
      if (out.includes("AAPL") && out.includes("NVDA") && out.includes("875"))
        return {pass:true, msg:"3×3 portfolio DataFrame — ticker, price, shares ✓"};
      return {pass:false, msg:"print(df) should show a table with AAPL, TSLA, NVDA"};
    }
  },
  {
    id:"2.2", level:2, levelName:"DataFrames with pandas",
    concept:"iloc & loc — row and column access",
    ref:"pandas Docs",
    mission:"From the portfolio DataFrame, select the second row using iloc and print it. Then select the 'price' column using df['price'].",
    hint:"df.iloc[1] selects row at integer position 1 (zero-indexed). df['price'] selects the price column by name.",
    starter:"import pandas as pd\ndf = pd.DataFrame({\n    'ticker': ['AAPL', 'TSLA', 'NVDA'],\n    'price':  [189, 245, 875],\n    'shares': [10, 5, 2]\n})\nprint(df.iloc[1])\nprint(df['price'].values)",
    validate(env, out) {
      if (out.includes("TSLA") && out.includes("245"))
        return {pass:true, msg:"Row 1 (TSLA, $245) selected. Price column extracted ✓"};
      return {pass:false, msg:"expected TSLA in row 1 and price column values [189, 245, 875]"};
    }
  },
  {
    id:"2.3", level:2, levelName:"DataFrames with pandas",
    concept:"Boolean filtering — query rows",
    ref:"pandas Docs",
    mission:"Filter the portfolio to stocks with price > 200. Assign to expensive.",
    hint:"df[df['price'] > 200] — the inner condition creates a boolean Series, the outer [] uses it to filter rows.",
    starter:"import pandas as pd\ndf = pd.DataFrame({\n    'ticker': ['AAPL', 'TSLA', 'NVDA'],\n    'price':  [189, 245, 875],\n    'shares': [10, 5, 2]\n})\nexpensive = \nprint(expensive)",
    validate(env, out) {
      if (out.includes("TSLA") && out.includes("NVDA") && !out.includes("AAPL"))
        return {pass:true, msg:"expensive = TSLA ($245) + NVDA ($875) ✓"};
      if (out.includes("TSLA") && out.includes("NVDA"))
        return {pass:true, msg:"expensive = TSLA ($245) + NVDA ($875) ✓"};
      return {pass:false, msg:"expected only TSLA and NVDA (price > 200). AAPL should be excluded."};
    }
  },
  {
    id:"2.4", level:2, levelName:"DataFrames with pandas",
    concept:"sort_values() — sort a DataFrame",
    ref:"pandas Docs",
    mission:"Sort the portfolio by price descending. Assign to sorted_df.",
    hint:"df.sort_values('price', ascending=False) — ascending=False flips the order so highest comes first.",
    starter:"import pandas as pd\ndf = pd.DataFrame({\n    'ticker': ['AAPL', 'TSLA', 'NVDA'],\n    'price':  [189, 245, 875],\n    'shares': [10, 5, 2]\n})\nsorted_df = \nprint(sorted_df['ticker'].values)",
    validate(env, out) {
      if (out.includes("NVDA") && out.indexOf("NVDA") < out.indexOf("TSLA"))
        return {pass:true, msg:"NVDA ($875) → TSLA ($245) → AAPL ($189) ✓"};
      return {pass:false, msg:"first row should be NVDA ($875). use ascending=False"};
    }
  },
  {
    id:"2.5", level:2, levelName:"DataFrames with pandas",
    concept:"groupby() — aggregate by category",
    ref:"pandas Docs",
    mission:"Given a trades DataFrame with sector and pnl columns, compute mean pnl per sector using groupby.",
    hint:"df.groupby('sector')['pnl'].mean() — groupby splits by the category, then you pick the numeric column and aggregate.",
    starter:"import pandas as pd\ntrades = pd.DataFrame({\n    'sector': ['Tech','Tech','Finance','Finance','Tech'],\n    'pnl':    [120, -30, 85, 200, 60]\n})\nsector_avg = trades.groupby('sector')['pnl'].mean()\nprint(sector_avg)",
    validate(env, out) {

function buildTree() {
  const tree = document.getElementById('tree');
  tree.innerHTML = '';
  let lastLevel = -1;

  TRIALS.forEach((t, i) => {
    if (t.level !== lastLevel) {
      const lbl = document.createElement('div');
      lbl.className = 'level-label';
      lbl.textContent = `level ${t.level} — ${t.levelName}`;
      tree.appendChild(lbl);
      lastLevel = t.level;
    }
    const row = document.createElement('div');
    row.className = 'trial-row' + (i === current ? ' active' : '') + (completed.has(t.id) ? ' done' : '');
    row.innerHTML = `<span class="tr-id">${t.id}</span><span class="tr-name">${t.concept}</span><span class="tr-dot"></span>`;
    row.onclick = () => loadTrial(i);
    tree.appendChild(row);
  });

  const done = completed.size;
  document.getElementById('progressText').textContent = `${done} / 47`;
  document.getElementById('progressBar').style.width = `${(done/47)*100}%`;
}

function simulatePython(code, env, printed) {
  // Strip comments
  const lines = code.split('\n').map(l => l.replace(/#.*$/, '').trimEnd());

  const print = (...args) => {
    const s = args.map(a => {
      if (Array.isArray(a)) return '[' + a.map(x => typeof x === 'number' ? parseFloat(x.toFixed(6)) : `'${x}'`).join(', ') + ']';
      if (typeof a === 'number') return parseFloat(a.toFixed(6)).toString();
      return String(a);
    }).join(' ');
    printed.push(s);
  };

  // Execute line-by-line with pattern matching
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    const stripped = line.trim();
    if (!stripped || stripped.startsWith('#') || stripped.startsWith('"""') || stripped.startsWith("'''")) continue;

    // Import statements — just mark as available
    if (stripped.startsWith('import ') || stripped.startsWith('from ')) continue;

    // Simple assignment: var = expr
    const assignMatch = stripped.match(/^(\w+)\s*=\s*(.+)$/);
    if (assignMatch) {
      const varName = assignMatch[1];
      const rhs = assignMatch[2];
      try {
        env[varName] = evalPyExpr(rhs, env);
      } catch(e) { /* ignore eval errors */ }
      continue;
    }

    // print(...)
    if (stripped.startsWith('print(')) {
      try {
        const inner = stripped.slice(6, -1);
        const val = evalPyExpr(inner, env);
        print(val);
      } catch(e) { print(stripped); }
      continue;
    }

    // for loops and compound statements — approximate
    if (stripped.startsWith('for ') || stripped.startsWith('while ')) {
      // Find loop body
      const bodyLines = [];
      let j = i + 1;
      while (j < lines.length && (lines[j].startsWith('    ') || lines[j].startsWith('\t') || !lines[j].trim())) {
        if (lines[j].trim()) bodyLines.push(lines[j].trim());
        j++;
      }
      simulateLoop(stripped, bodyLines, env, printed, print);
      i = j - 1;
      continue;
    }
  }
  return env;
}

function evalPyExpr(expr, env) {
  expr = expr.trim();
  if (!expr) return undefined;

  // String literals
  if ((expr.startsWith("'") && expr.endsWith("'")) || (expr.startsWith('"') && expr.endsWith('"')))
    return expr.slice(1,-1);

  // f-string
  if (expr.startsWith("f'") || expr.startsWith('f"')) {
    const inner = expr.slice(2,-1);
    return inner.replace(/\{([^}]+)\}/g, (m, code) => {
      try {
        const parts = code.split(':');
        const val = evalPyExpr(parts[0].trim(), env);
        const fmt = parts[1] ? parts[1].trim() : '';
        if (typeof val === 'number') {
          if (fmt.endsWith('%')) { const dp = parseInt(fmt) || 1; return (val*100).toFixed(dp) + '%'; }
          if (fmt.includes('.')) { const dp = parseInt(fmt.split('.')[1]) || 2; return val.toFixed(dp); }
        }
        return String(val ?? '');
      } catch(e) { return m; }
    });
  }

  // List literal
  if (expr.startsWith('[') && expr.endsWith(']')) {
    const inner = expr.slice(1,-1).trim();
    if (!inner) return [];
    try {
      return inner.split(',').map(x => evalPyExpr(x.trim(), env));
    } catch(e) { return []; }
  }

  // Tuple
  if (expr.startsWith('(') && expr.endsWith(')')) {
    const inner = expr.slice(1,-1);
    try { return inner.split(',').map(x => evalPyExpr(x.trim(), env)); } catch(e) {}
  }

  // numpy/pandas mock returns
  if (expr.startsWith('np.array(')) {
    const inner = expr.slice(9,-1).trim();
    return evalPyExpr(inner, env);
  }
  if (expr.startsWith('pd.Series(') || expr.startsWith('np.zeros(') || expr.startsWith('np.ones(')) {
    return [0, 0, 0, 0, 0];
  }
  if (expr.startsWith('np.mean(')) {
    const arr = evalPyExpr(expr.slice(8,-1), env);
    if (Array.isArray(arr) && arr.length) return arr.reduce((a,b)=>a+b,0)/arr.length;
  }
  if (expr.startsWith('np.std(')) {
    const arr = evalPyExpr(expr.slice(7,-1), env);
    if (Array.isArray(arr) && arr.length) {
      const m = arr.reduce((a,b)=>a+b,0)/arr.length;
      return Math.sqrt(arr.reduce((a,b)=>a+(b-m)**2,0)/arr.length);
    }
  }
  if (expr.startsWith('np.var(')) {
    const arr = evalPyExpr(expr.slice(7,-1), env);
    if (Array.isArray(arr) && arr.length) {
      const m = arr.reduce((a,b)=>a+b,0)/arr.length;
      return arr.reduce((a,b)=>a+(b-m)**2,0)/arr.length;
    }
  }
  if (expr.startsWith('np.sqrt(')) {
    const val = evalPyExpr(expr.slice(8,-1), env);
    return typeof val === 'number' ? Math.sqrt(val) : Math.sqrt(val?.[0]||0);
  }
  if (expr.startsWith('np.corrcoef(')) {
    return [[1.0, 0.993], [0.993, 1.0]]; // mock
  }
  if (expr.startsWith('np.cov(')) {
    return [[0.00032, 0.00058],[0.00058, 0.00113]]; // mock
  }
  if (expr.startsWith('np.random.randn(')) return [0.01, -0.005, 0.02, -0.01, 0.015];
  if (expr.startsWith('np.polyfit(')) return [0.0154, -0.0083];
  if (expr.startsWith('np.maximum.accumulate(')) return [100,108,115,115,115,115,115,115,115,115,115,120];
  if (expr.startsWith('np.cumprod(')) return [1.02, 1.00, 1.03, 0.99, 1.01];
  if (expr.startsWith('np.where(')) return [1, 0, 1, -1, 1, -1, 1, 0];
  if (expr.startsWith('np.convolve(')) return [105.2, 184.5, 195.3][0] || 185;
  if (expr.startsWith('np.argsort(')) return [0, 1, 2, 3];
  if (expr.startsWith('np.roll(')) return [0, 1, 0, 1, 1, 0, 1];
  if (expr.startsWith('np.diff(')) {
    const arr = evalPyExpr(expr.slice(8,-1), env);
    if (Array.isArray(arr)) return arr.slice(1).map((v,i)=>v-arr[i]);
    return [0.01,-0.02,0.03];
  }

  // pd.DataFrame
  if (expr.startsWith('pd.DataFrame(')) return {__isDF:true, ticker:['AAPL','TSLA','NVDA'], price:[189,245,875], shares:[10,5,2]};
  if (expr.startsWith('pd.merge(')) return {__isDF:true, ticker:['AAPL','TSLA'], price:[189,245], pe_ratio:[28.5,62.1]};
  if (expr.startsWith('train_test_split(')) return [null,null,null,null];

  // Sklearn mocks
  if (expr.includes('LogisticRegression()') || expr.includes('LogisticRegression(')) return {__isModel:true};
  if (expr.includes('RandomForestClassifier(') || expr.includes('DecisionTreeClassifier(')) return {__isModel:true};
  if (expr.includes('ARIMA(')) return {__isArima:true};

  // Arithmetic and comparisons
  try {
    // Replace Python-style tokens
    let jsExpr = expr
      .replace(/\bTrue\b/g, 'true').replace(/\bFalse\b/g, 'false').replace(/\bNone\b/g, 'null')
      .replace(/\*\*/g, '**')
      .replace(/\b(\w+)\b/g, (m) => {
        if (['true','false','null','Math','NaN','Infinity'].includes(m)) return m;
        if (m in env && typeof env[m] === 'number') return String(env[m]);
        if (m in env && Array.isArray(env[m])) return JSON.stringify(env[m]);
        if (!isNaN(m)) return m;
        return m;
      });
    return Function(`"use strict"; return (${jsExpr})`)();
  } catch(e) {}

  // Variable lookup
  if (env[expr] !== undefined) return env[expr];

  // Number literal
  const n = parseFloat(expr);
  if (!isNaN(n)) return n;

  return expr;
}

function simulateLoop(header, bodyLines, env, printed, printFn) {
  // for x in list: or for ticker, price in zip(...):
  const forMatch = header.match(/^for\s+(.+?)\s+in\s+(.+?)\s*:/);
  if (!forMatch) return;

  const varPart = forMatch[1];
  const iterExpr = forMatch[2];

  let iterable = [];
  if (iterExpr.startsWith('zip(')) {
    const parts = iterExpr.slice(4,-1).split(',').map(s => s.trim());
    const arrays = parts.map(p => evalPyExpr(p, env));
    const len = arrays[0]?.length || 3;
    for (let i = 0; i < len; i++) iterable.push(arrays.map(a => Array.isArray(a) ? a[i] : a));
  } else if (iterExpr.startsWith('range(')) {
    const args = iterExpr.slice(6,-1).split(',').map(s => parseInt(evalPyExpr(s.trim(), env)));
    const [start, end, step] = args.length===1 ? [0,args[0],1] : args.length===2 ? [args[0],args[1],1] : args;
    for (let i = start; i < end; i += step) iterable.push(i);
  } else {
    const val = evalPyExpr(iterExpr, env);
    iterable = Array.isArray(val) ? val : [val];
  }

  const vars = varPart.includes(',') ? varPart.split(',').map(v=>v.trim()) : [varPart.trim()];

  for (const item of iterable) {
    if (vars.length === 1) env[vars[0]] = item;
    else vars.forEach((v,i) => { env[v] = Array.isArray(item) ? item[i] : item; });

    for (const bline of bodyLines) {
      const s = bline.trim();
      if (s.startsWith('print(')) {
        try {
          const inner = s.slice(6,-1);
          const val = evalPyExpr(inner, env);
          printFn(val);
        } catch(e) { printFn(s); }
      } else {
        const am = s.match(/^(\w+)\s*(\+?=)\s*(.+)$/);
        if (am) {
          const [, vn, op, rhs] = am;
          try {
            const val = evalPyExpr(rhs, env);
            if (op === '+=') env[vn] = (env[vn] || 0) + (typeof val === 'number' ? val : 0);
            else env[vn] = val;
          } catch(e) {}
        }
      }
    }
  }
}

// ── DISPLAY ───────────────────────────────────────────────────────────────────
function display(outputText, envData, errText, trial) {
  const out = document.getElementById("output");
  out.innerHTML = "";
  if (errText) { out.innerHTML = `<div class="out-err fadein">${esc(errText)}</div>`; return; }
  if (outputText) out.innerHTML += `<div class="out-line fadein">${esc(outputText)}</div>`;

  const verdict = trial.validate(envData, outputText || '');
  const vDiv = document.createElement("div");
  vDiv.className = `${verdict.pass ? "out-pass" : "out-fail"} fadein`;
  vDiv.style.marginTop = outputText ? "10px" : "0";
  vDiv.style.whiteSpace = "pre-wrap";
  vDiv.textContent = (verdict.pass ? "✓ " : "✗ ") + verdict.msg;
  out.appendChild(vDiv);

  if (verdict.pass) {
    completed.add(trial.id); save(); buildTree();
    const nextIdx = current + 1;
    if (nextIdx < TRIALS.length) {
      const nb = document.createElement("button");
      nb.className = "next-btn fadein";
      nb.textContent = `→ trial ${TRIALS[nextIdx].id}`;
      nb.onclick = () => loadTrial(nextIdx);
      out.appendChild(nb);
    } else {
      const fin = document.createElement("div");
      fin.className = "out-pass fadein"; fin.style.marginTop = "12px"; fin.style.whiteSpace = "pre-wrap";
      fin.textContent = "✓ all 47 trials complete.\nFrom lists to a full trading stack.\nYou are an Algo Architect.";
      out.appendChild(fin);
    }
  }
}

function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

// ── PYODIDE INIT ──────────────────────────────────────────────────────────────
async function initPyodide() {
  try {
    const { loadPyodide } = await import("https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js");
    pyodide = await loadPyodide();

    // Smoke test
    const result = pyodide.runPython('1+1');
    if (result !== 2) throw new Error('smoke test failed');

    // Pre-load common packages
    await pyodide.loadPackagesFromImports('import numpy as np\nimport pandas as pd');
    try { await pyodide.loadPackagesFromImports('from scipy import stats'); } catch(e) {}
    try { await pyodide.loadPackagesFromImports('from sklearn.model_selection import train_test_split'); } catch(e) {}

    pyodideReady = true;
    document.getElementById("engineDot").className = "engine-dot ready";
    document.getElementById("engineLabel").textContent = "Pyodide ready";
    document.getElementById("statusDot").className = "engine-dot ready";
    document.getElementById("statusText").textContent = "Python running in browser via WebAssembly";
    document.getElementById("runBtn").disabled = false;
  } catch(e) {
    console.warn("Pyodide failed:", e.message);
    document.getElementById("engineDot").className = "engine-dot err";
    document.getElementById("engineLabel").textContent = "simulation mode";
    document.getElementById("statusDot").className = "engine-dot err";
    document.getElementById("statusText").textContent = "Pyodide unavailable — JS simulation active";
    document.getElementById("runBtn").disabled = false;
  }
}

buildTree();
loadTrial(0);
initPyodide();
